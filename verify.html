<!doctype html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Verification</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="h-full flex items-center justify-center p-4">
    <div class="card p-8 w-full max-w-lg text-center fade-in">
        <!-- Loading State -->
        <div id="loading" class="flex flex-col items-center justify-center">
            <div class="h-10 w-10 border-4 border-t-[#22c55e] border-opacity-20 rounded-full animate-spin"></div>
            <p class="mt-4" style="color: rgba(241,245,249,0.7);">Verifying Driver Identity...</p>
        </div>

        <!-- Error State -->
        <div id="error-state" class="hidden flex-col items-center">
            <div class="w-16 h-16 rounded-full flex items-center justify-center mb-4"
                style="background: rgba(239, 68, 68, 0.2); color: #ef4444;">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </div>
            <h2 class="text-2xl font-bold mb-2">Verification Failed</h2>
            <p id="error-msg" class="mb-6" style="color: rgba(241,245,249,0.7);">Invalid or missing ID.</p>
        </div>

        <!-- Verified State -->
        <div id="verified-state" class="hidden flex-col items-center text-left">
            <div class="w-full flex justify-center mb-6">
                <div class="w-16 h-16 rounded-full flex items-center justify-center mb-2"
                    style="background: rgba(34, 197, 94, 0.2); color: #22c55e;">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
            </div>

            <h2 class="text-3xl font-bold mb-1 text-center w-full" style="color: #22c55e;">VERIFIED DRIVER</h2>
            <p class="text-center w-full mb-8" style="color: rgba(241,245,249,0.6);">Official Record from Database</p>

            <div class="w-full bg-[#1e293b] rounded-lg p-6 mb-4 border border-gray-700">
                <div class="border-b border-gray-700 pb-4 mb-4 flex gap-4 items-center">
                    <div id="driver-photo-container"
                        class="w-20 h-20 rounded-full overflow-hidden flex items-center justify-center"
                        style="background: rgba(255,255,255,0.1);">
                        <svg class="w-10 h-10" style="color: rgba(241,245,249,0.4);" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                    <div>
                        <p class="text-sm font-semibold uppercase tracking-wider" style="color: rgba(241,245,249,0.5);">
                            Driver Name</p>
                        <p id="v-name" class="text-2xl font-bold">---</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-y-4 gap-x-2 w-full">
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-wider" style="color: rgba(241,245,249,0.5);">
                            Phone</p>
                        <p id="v-phone" class="font-medium text-lg">---</p>
                    </div>
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-wider" style="color: rgba(241,245,249,0.5);">
                            License</p>
                        <p id="v-license" class="font-medium text-lg">---</p>
                    </div>
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-wider" style="color: rgba(241,245,249,0.5);">
                            Age</p>
                        <p id="v-age" class="font-medium text-lg">---</p>
                    </div>
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-wider" style="color: rgba(241,245,249,0.5);">
                            Vehicle Type</p>
                        <p id="v-type" class="font-medium text-lg">---</p>
                    </div>
                    <div class="col-span-2">
                        <p class="text-xs font-semibold uppercase tracking-wider" style="color: rgba(241,245,249,0.5);">
                            Vehicle Number</p>
                        <p id="v-vnumber" class="font-medium text-xl font-mono text-yellow-400">---</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        async function verifyDriver() {
            const urlParams = new URLSearchParams(window.location.search);
            const driverId = urlParams.get('id');

            const loading = document.getElementById('loading');
            const errorState = document.getElementById('error-state');
            const verifiedState = document.getElementById('verified-state');

            if (!driverId) {
                loading.classList.add('hidden');
                errorState.classList.remove('hidden');
                document.getElementById('error-msg').textContent = 'No ID provided in the URL.';
                return;
            }

            try {
                const response = await fetch(`/api/drivers/${driverId}`);
                const result = await response.json();

                loading.classList.add('hidden');

                if (!result.success || !result.data) {
                    errorState.classList.remove('hidden');
                    document.getElementById('error-msg').textContent = result.message || 'Driver profile not found.';
                    return;
                }

                const data = result.data;
                document.getElementById('v-name').textContent = data.driver_name;
                document.getElementById('v-phone').textContent = data.mobile_number;
                document.getElementById('v-license').textContent = data.license_number;
                document.getElementById('v-age').textContent = data.driver_age;
                document.getElementById('v-type').textContent = data.vehicle_type;
                document.getElementById('v-vnumber').textContent = data.vehicle_number;

                if (data.photo) {
                    document.getElementById('driver-photo-container').innerHTML = `<img src="${data.photo}" class="w-full h-full object-cover">`;
                }

                verifiedState.classList.remove('hidden');
                verifiedState.classList.add('flex');

            } catch (err) {
                loading.classList.add('hidden');
                errorState.classList.remove('hidden');
                document.getElementById('error-msg').textContent = 'Failed to connect to verification server.';
            }
        }

        document.addEventListener("DOMContentLoaded", verifyDriver);
    </script>
</body>

</html>
